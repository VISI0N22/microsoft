<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h3>ReFree Pro</h3>

  <input id="count" type="number" placeholder="Number of searches">
  <input id="interval" type="number" placeholder="Interval (seconds)">

  <div id="engine" class="engine">Engine: Bing</div>
  <div id="status" class="status stopped">Stopped</div>

  <button id="start">Start Bot</button>
  <button id="stop" disabled>Stop Bot</button>

  <script src="popup.js"></script>
</body>
</html>
